repos:
  # Базовые проверки репозитория
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace        # Удаляет пробелы в конце строк
      - id: end-of-file-fixer          # Добавляет пустую строку в конец файла
      - id: check-yaml                 # Проверяет синтаксис YAML
      - id: check-added-large-files    # Не даёт коммитить большие файлы
        exclude: ^data/(input|processed)/
      - id: check-merge-conflict       # Ловит <<<<<<< ======= >>>>>>>

  # Black — форматирование кода
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  # isort — сортировка импортов (совместим с Black)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]

  # Flake8 — линтинг
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503
